<!DOCTYPE html>
<html>

<head>

    <title>Crop Insurance AI</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>

<body>

    <h2>Crop Damage Inspection</h2>

    <video id="video" width="400" autoplay></video>

    <button onclick="capture()">Capture & Analyze (Webcam)</button>

    <br><br>
    
    <h3>Or Upload an Image:</h3>
    <input type="file" id="imageUpload" accept="image/*">
    <button onclick="uploadAndAnalyze()">Upload & Analyze</button>

    <canvas id="canvas" style="display:none"></canvas>

    <div id="result" style="font-size:18px;margin-top:20px"></div>

    <div id="map" style="height:400px"></div>

    <script src="script.js"></script>

</body>

</html>
