<!DOCTYPE html>
<html>
<head>
    <title>Select Farm Location</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <style>
        #map { height: 500px; width: 100%; margin-top: 20px; }
        .container { padding: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Crop Insurance Satellite Verification</h2>
        <input type="file" id="imageUpload">
        <button onclick="uploadImage()">Analyze Image</button>
        <p id="coords"></p>
        <div id="map"></div>
    </div>

    <script>
        var map = L.map('map').setView([11.1271, 78.6569], 6);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19
        }).addTo(map);

        map.on('click', function(e) {
            var lat = e.latlng.lat;
            var lon = e.latlng.lng;

            var marker = L.marker([lat, lon]).addTo(map);
            marker.bindPopup("Selected Location").openPopup();

            document.getElementById("coords").innerHTML = "Latitude: " + lat + " Longitude: " + lon;

            // Dynamically resolve backend API using port 8000
            var API_BASE = window.location.protocol + "//" + window.location.hostname + ":8000";
            fetch(API_BASE + "/satellite-analysis?lat=" + lat + "&lon=" + lon)
            .then(res => res.json())
            .then(data => {
                alert("NDVI Value: " + (data.ndvi_value ? (data.ndvi_value.nd || JSON.stringify(data.ndvi_value)) : "N/A"));
            })
            .catch(err => console.error("Error:", err));
        });

        function uploadImage() {
            var fileInput = document.getElementById("imageUpload");
            if (!fileInput.files.length) {
                alert("Please select a file first.");
                return;
            }
            var file = fileInput.files[0];
            var formData = new FormData();
            formData.append("file", file);

            // Dynamically resolve backend API using port 8000
            var API_BASE = window.location.protocol + "//" + window.location.hostname + ":8000";
            fetch(API_BASE + "/analyze", {
                method: "POST",
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                if (data.latitude && data.longitude) {
                    var lat = data.latitude;
                    var lon = data.longitude;
                    var ndvi = (data.ndvi && data.ndvi.nd) ? data.ndvi.nd : "N/A";

                    var marker = L.marker([lat, lon]).addTo(map);
                    marker.bindPopup("Image Location<br>NDVI: " + ndvi).openPopup();
                    map.setView([lat, lon], 12);
                } else {
                    alert("Analysis complete, but no location found in image.");
                }
            })
            .catch(err => {
                console.error("Error:", err);
                alert("Analysis failed. See console for details.");
            });
        }
    </script>
</body>
</html>
